<!DOCTYPE html>
<!-- Định nghĩa loại tài liệu HTML5 -->
<html lang="vi">
<head>
<meta charset="UTF-8"> <!-- Đặt mã hóa ký tự UTF-8 -->
<title>Bảng Lương Nhân Viên</title> <!-- Tiêu đề trang hiển thị trên tab trình duyệt -->
</head>
<body>
<h2>Bảng Lương Nhân Viên</h2> <!-- Tiêu đề chính của trang -->
<table border="1"> <!-- Bảng hiển thị dữ liệu và lằn viền 1px -->
<tr>
<th>Tên Nhân Viên</th> <!-- Cột tên nhân viên -->
<th>Tháng</th> <!-- Cột tháng lương -->
<th>Lương Cơ Bản</th> <!-- Cột lương cơ bản -->
<th>Phụ Cấp</th> <!-- Cột phụ cấp -->
<th>Thưởng</th> <!-- Cột thưởng -->
<th>Khấu Trừ</th> <!-- Cột khấu trừ -->
<th>Lương Thực Nhận</th> <!-- Cột lương thực nhận -->
</tr>
{% for nv, luong in nhan_viens %} <!-- Vòng lặp Jinja qua danh sách nhân viên + lương -->
<tr>
<td>{{ nv.HoTen }}</td> <!-- Hiển thị tên nhân viên từ đối tượng nv -->
<td>{{ luong.ThangNam }}</td> <!-- Hiển thị tháng/năm từ đối tượng lương -->
<td>{{ luong.LuongCoBan }}</td> <!-- Hiển thị lương cơ bản -->
<td>{{ luong.PhuCap }}</td> <!-- Hiển thị phụ cấp -->
<td>{{ luong.Thuong }}</td> <!-- Hiển thị thưởng -->
<td>{{ luong.KhauTru }}</td> <!-- Hiển thị khấu trừ -->
<td>{{ luong.LuongThucNhan }}</td> <!-- Hiển thị lương thực nhận -->
</tr>
{% endfor %} <!-- Kết thúc vòng lặp dữ liệu -->
</table>
</body>
</html>
